<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dog Image Generator</title>
  <link rel="stylesheet" href="index.css">
</head>

<body>

  <!-- ================= SIGN IN PAGE ================= -->
  <div id="auth-container" class="auth-container">

    <div class="app-icon">
      <img src="https://img.freepik.com/premium-vector/dog-logo-design-icon-symbol-vector-illustration_1123785-3846.jpg" alt="Dog App Icon">
    </div>

    <h1>Welcome to Dog Image Generator!</h1>
    <p>Sign in to create your own gallery of adorable dogs!</p>

    <button class="google-signin">
      <img src="google.png" alt="Google Icon">
      Sign in with Google
    </button>

    <form class="auth-form">
      <input type="email" name="email" placeholder="Email" required>
      <input type="password" name="password" placeholder="Password" required>
      <button type="submit" class="sign-in-btn">Sign In</button>
    </form>

    <p class="create-account">
      New to Dog Image Generator? <a href="/signup">Create Account</a>
    </p>

  </div>


  <!-- ================= DASHBOARD PAGE ================= -->
  <div id="dashboard-container" style="display:none;">

    <header class="header">
      <div class="welcome">
        Welcome, <span id="user-name">User</span>!
      </div>
    </header>

    <div class="dashboard-container">

      <!-- Album -->
      <div class="album-section">
        <h2>Your Album</h2>
        <div class="album-image">
          <p>No images yet</p>
        </div>
      </div>

      <!-- Generator -->
      <div class="generate-section">
        <h2>Generate Dog Image</h2>

        <select class="breed-dropdown">
          <option value="bulldog">Bulldog</option>
          <option value="poodle">Poodle</option>
          <option value="retriever">Retriever</option>
        </select>

        <button class="generate-btn">Generate</button>

        <div class="image-container">
          <img id="generated-image" src="" alt="">
        </div>

        <button class="save-btn">Save to Album</button>
      </div>

    </div>
  </div>


  <!-- ================= FIREBASE ================= -->

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

  <script>
    // FIREBASE CONFIG 
    const firebaseConfig = {
      apiKey: "AIzaSyBucPtSiBjIKiJNENfNYbRrIAfNNMG9AJQ",
      authDomain: "dog-api-28c13.firebaseapp.com",
      projectId: "dog-api-28c13",
      appId: "1:1095462021524:web:d5d5982bd25bcc0b908781"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // ================= AUTH LOGIC =================

    const authPage = document.getElementById("auth-container");
    const dashboardPage = document.getElementById("dashboard-container");

    // Login
    const form = document.querySelector(".auth-form");

    form.addEventListener("submit", (e) => {
      e.preventDefault();

      const email = form.email.value;
      const password = form.password.value;

      auth.signInWithEmailAndPassword(email, password)
        .then((userCredential) => {
          showDashboard(userCredential.user);
        })
        .catch((error) => {
          alert(error.message);
        });
    });

    // Auto login check
    auth.onAuthStateChanged((user) => {
      if (user) {
        showDashboard(user);
      } else {
        showAuth();
      }
    });

    function showDashboard(user) {
      authPage.style.display = "none";
      dashboardPage.style.display = "block";

      document.getElementById("user-name").textContent = user.email;
    }

    function showAuth() {
      authPage.style.display = "block";
      dashboardPage.style.display = "none";
    }

  </script>

</body>
</html>
