<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dog Image Generator</title>
  <link rel="stylesheet" href="index.css">
</head>

<body>

  <!-- ================= SIGN IN PAGE ================= -->
  <div id="auth-container" class="auth-container">

    <div class="app-icon">
      <img src="https://img.freepik.com/premium-vector/dog-logo-design-icon-symbol-vector-illustration_1123785-3846.jpg" alt="Dog App Icon">
    </div>

    <h1>Welcome to Dog Image Generator!</h1>
    <p>Sign in to create your own gallery of adorable dogs!</p>

    <button id="google-signin-btn" class="google-signin">
      <img src="google.png" alt="Google Icon">
      Sign in with Google
    </button>

    <form class="auth-form">
      <input type="email" name="email" placeholder="Email" required>
      <input type="password" name="password" placeholder="Password" required>
      <button id="sign-in-submit-btn" type="submit" class="sign-in-btn">Sign In</button>
    </form>

    <p id="auth-toggle-text" class="create-account">
      New to Dog Image Generator? <a href="#" id="create-account-link">Create Account</a>
    </p>
    <p id="back-to-signin" class="create-account" style="display:none;">
      Already have an account? <a href="#" id="back-to-signin-link">Sign in</a>
    </p>

  </div>


  <!-- ================= DASHBOARD PAGE ================= -->
  <div id="dashboard-container" style="display:none;">

    <header class="header">
      <div class="welcome">
        Welcome, <span id="user-name">User</span>!
      </div>
      <button id="sign-out-btn" class="sign-out-btn">Sign Out</button>
    </header>

    <div class="dashboard-container">

      <!-- Album -->
      <div class="album-section">
        <h2>Your Album</h2>
        <div class="album-image">
          <p>No images yet</p>
        </div>
      </div>

      <!-- Generator -->
      <div class="generate-section">
        <h2>Generate Dog Image</h2>

        <select class="breed-dropdown">
          <option value="bulldog">Bulldog</option>
          <option value="poodle">Poodle</option>
          <option value="retriever">Retriever</option>
        </select>

        <button class="generate-btn">Generate</button>

        <div class="image-container">
          <img id="generated-image" src="" alt="">
        </div>

        <button class="save-btn">Save to Album</button>
      </div>

    </div>
  </div>


  <!-- ================= FIREBASE ================= -->

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="index.js"></script>

</body>
</html>
